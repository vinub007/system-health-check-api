version: "3.9"

# Fix issue 6: Added Jaeger all-in-one as a local trace backend.
# Full local observability stack: API + Prometheus + Grafana + Jaeger.
# Run: docker compose up --build
# Then visit:
#   API docs:   http://localhost:8000/docs
#   Prometheus: http://localhost:9090
#   Grafana:    http://localhost:3000   (anonymous access, no login)
#   Jaeger UI:  http://localhost:16686

services:
  api:
    build:
      context: .
      target: runtime
    ports:
      - "8000:8000"
    environment:
      LOG_LEVEL: "INFO"
      LOG_FORMAT: "text"
      ENVIRONMENT: "local"
      # Enable tracing locally — set to "false" to disable
      OTEL_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: "http://jaeger:4317"
      OTEL_SERVICE_NAME: "system-health-api"
    depends_on:
      jaeger:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # Fix issue 6: Jaeger all-in-one — receives OTLP spans, provides trace UI.
  # Single image, zero extra configuration required.
  jaeger:
    image: jaegertracing/all-in-one:1.62
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver (used by the API)
      - "4318:4318"     # OTLP HTTP receiver (alternative)
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:14269/"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      api:
        condition: service_healthy   # wait for API HEALTHCHECK to pass before scraping
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.3.1
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
